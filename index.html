<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELORA ATELIER | Artisan Bakery</title>
    <style>
        /* 
          VELORA ATELIER — Brand Style Sheet
          Aesthetic: Celine / Aesop Editorial Minimalist
        */
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #fcfbfa; /* Warm off-white / Editorial cream */
            color: #111111; /* Deep matte black */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            letter-spacing: 0.04em;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* Organic Matte Texture Overlay Simulation */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.02;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Typography Hierarchy */
        h1, h2, h3, .serif-editorial {
            font-family: "Didot", "Bodoni MT", "Cinzel", "Times New Roman", serif;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        a {
            color: #111111;
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: opacity 0.4s ease;
        }

        a:hover {
            opacity: 0.4;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* Fixed Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background-color: rgba(252, 251, 250, 0.9);
            backdrop-filter: blur(8px);
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100px;
            border-bottom: 1px solid rgba(17, 17, 17, 0.04);
            padding: 0 60px;
        }

        .nav-logo {
            font-size: 16px;
            letter-spacing: 0.3em;
        }

        .nav-links {
            display: flex;
            gap: 50px;
        }

        /* Full Screen Editorial Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 100px;
            background: linear-gradient(rgba(252, 251, 250, 0.2), rgba(252, 251, 250, 0.2)),
                        url('https://images.unsplash.com/photo-1549931319-a545dcf3bc73?auto=format&fit=crop&w=2000&q=85') no-repeat center center/cover;
            position: relative;
        }

        .hero-title {
            font-size: 42px;
            letter-spacing: 0.35em;
            margin-bottom: 12px;
            animation: slowFade 1.8s ease-out;
        }

        .hero-tagline {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: #666666;
            margin-bottom: 40px;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            opacity: 0.5;
        }

        /* Luxury Breathing Space Layouts */
        .section {
            padding: 160px 0;
        }

        .section-title-wrapper {
            text-align: center;
            margin-bottom: 100px;
        }

        .section-tag {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #8c7653; /* Warm raw brass tone */
            display: block;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 26px;
            letter-spacing: 0.2em;
        }

        /* Menu Grid Section */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            column-gap: 120px;
            row-gap: 60px;
        }

        .menu-category-title {
            grid-column: 1 / -1;
            font-size: 14px;
            border-bottom: 1px solid #111111;
            padding-bottom: 15px;
            margin-bottom: 20px;
            color: #111111;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid rgba(17, 17, 17, 0.06);
            padding-bottom: 25px;
        }

        .menu-item-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }

        .item-name {
            font-size: 16px;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .item-price {
            font-family: "Didot", serif;
            font-size: 15px;
            letter-spacing: 0.05em;
        }

        .item-meta {
            font-size: 12px;
            color: #666666;
            font-style: italic;
            font-family: "Times New Roman", serif;
        }

        /* Editorial Split / About Section */
        .about-wrap {
            display: flex;
            align-items: center;
            gap: 100px;
        }

        .about-img {
            flex: 1;
            height: 650px;
            background: url('https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=1200&q=85') no-repeat center center/cover;
            filter: sepia(10%) contrast(98%);
        }

        .about-content {
            flex: 1;
            padding-right: 40px;
        }

        .about-statement {
            font-family: "Didot", "Times New Roman", serif;
            font-size: 24px;
            line-height: 1.8;
            color: #222222;
            letter-spacing: 0.02em;
        }

        /* Contact & Hours Section */
        .contact-section {
            background-color: #f7f5f0; /* Slightly deeper tone to ground the layout */
            text-align: center;
            padding: 140px 0;
        }

        .contact-details {
            max-width: 500px;
            margin: 0 auto;
        }

        .contact-hours {
            font-family: "Didot", serif;
            font-size: 20px;
            letter-spacing: 0.1em;
            margin-bottom: 25px;
        }

        .contact-phone {
            font-size: 14px;
            letter-spacing: 0.25em;
            display: block;
            margin-bottom: 40px;
        }

        .footer-note {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #888888;
            margin-top: 60px;
            border-top: 1px solid rgba(17, 17, 17, 0.05);
            padding-top: 40px;
        }

        /* Animations */
        @keyframes slowFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Breakpoints */
        @media (max-width: 900px) {
            .nav-wrapper { padding: 0 30px; height: 80px; }
            .nav-links { gap: 25px; }
            .hero-title { font-size: 30px; }
            .menu-grid { grid-template-columns: 1fr; row-gap: 40px; }
            .about-wrap { flex-direction: column; gap: 50px; }
            .about-img { width: 100%; height: 400px; }
            .about-content { padding-right: 0; }
            .section { padding: 100px 0; }
        }
    </style>
</head>
